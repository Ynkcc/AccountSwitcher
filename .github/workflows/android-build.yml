name: Android Release

on:
  push:
    tags:
      - '*'


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: android_build
    env:
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 platform
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Validate signing secrets
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_PASSWORD"

      - name: Prepare signing files
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          cat <<EOF > local.properties
          release.storeFile=$RUNNER_TEMP/release.jks
          release.keyAlias=${RELEASE_KEY_ALIAS:-key0}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon -Pkotlin.compiler.execution.strategy=in-process

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
